  variables:
    BUILD_ENV: "prd"
    TARGET_DESC: "EXT 01"
    DEPLOY_IP: "$PRD_WEB_IP_EXT_01"
    DEPLOY_USER: "$PRD_WEB_USER_01"
    DEPLOY_PATH: "$PRD_WEB_DEPLOY_PATH_01"
    DEPLOY_RSA: "$PRD_WEB_RSA_EXT_01"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"'
      when: manual

# =========================
# main 운영 배포 (EXT 02)
# =========================
prd:ext:02:deploy:
  extends: .deploy-prd-template
  variables:
    BUILD_ENV: "prd"
    TARGET_DESC: "EXT 02"
    DEPLOY_IP: "$PRD_WEB_IP_EXT_02"
    DEPLOY_USER: "$PRD_WEB_USER_02"
    DEPLOY_PATH: "$PRD_WEB_DEPLOY_PATH_02"
    DEPLOY_RSA: "$PRD_WEB_RSA_EXT_02"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"'
      when: manual
