    DEPLOY_RSA: "$PRD_WEB_RSA_INT_02"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"'
      when: manual

# =========================
# main 운영 배포 (EXT 01)
# =========================
